# Stealth Accumulation Scanner AI Agent Configuration
# ====================================================

# Scanner Settings
scanner:
  # Stock Universe Filters
  universe:
    exchange: "NSE"
    min_market_cap_cr: 500 # ₹500 Cr
    min_avg_volume: 200000 # 200,000 shares

  # Lookback Periods (in trading days)
  lookback:
    min_range_days: 30
    max_range_days: 90
    volume_analysis_days: 20
    delivery_analysis_days: 10
    rs_analysis_days: 20

  # Accumulation Detection Thresholds
  thresholds:
    max_range_percentage: 25 # (Highest - Lowest) < 25%
    min_support_touches: 3
    support_deviation: 3 # < 3%
    min_delivery_pct: 50 # > 50% preferred
    resistance_proximity: 5 # within 5%

# AI Scoring Model Weights
scoring:
  weights:
    price_structure: 20
    volume_behavior: 20
    delivery_data: 15
    support_strength: 15
    relative_strength: 10
    volatility_compression: 10
    ma_behavior: 10

  thresholds:
    strong_setup: 80
    moderate_setup: 60

# Trade Setup Generator
trade_setup:
  entry:
    breakout_threshold: 0.02 # 2% above resistance
    early_entry_discount: 0.03 # 3% below resistance (early accumulation)

  stop_loss:
    below_support: 0.02 # 2% below support
    max_loss: 3 # Maximum 3%

  targets:
    t1_range_height: 1.0 # Range height breakout
    t2_range_height: 1.5 # 1.5x range
    t3_previous_high: true # Previous swing high

  duration:
    short_term_weeks: [2, 4]
    medium_term_months: [1, 3]

  # Time estimation based on ATR
  time_estimation:
    enabled: true
    atr_period: 14

# Telegram Bot Configuration
# NOTE: Sensitive values should be set via environment variables:
# - TELEGRAM_BOT_TOKEN
# - TELEGRAM_CHAT_ID
# Or copy .env.example to .env and fill in your values
telegram:
  enabled: true
  bot_token: "" # Set via TELEGRAM_BOT_TOKEN env var
  chat_id: "" # Set via TELEGRAM_CHAT_ID env var
  alert_threshold: 60 # Only send alerts for scores >= 60
  min_signals_per_scan: 2 # Minimum signals to send (pad with lower scores if needed)

# Scheduler Configuration - Runs hourly during market hours + immediate scan on deploy
scheduler:
  timezone: "Asia/Kolkata"

  # Scan on deployment (immediate scan when app starts)
  scan_on_deploy: true

  # Hourly scanning during market hours (9:15 AM to 3:30 PM IST)
  scan_interval_hours: 1

  # Run days: Monday=0, Tuesday=1, ..., Friday=4
  run_days: [1, 2, 3, 4, 5]  # Monday to Friday (0=Monday, 5=Sunday)

  # Market hours (9:15 AM to 3:30 PM IST)
  market_open_hour: 9
  market_open_minute: 15
  market_close_hour: 15
  market_close_minute: 30

# Data Source Configuration
data:
  source: "yahoo" # yahoo, nse, or custom
  cache_enabled: true
  cache_ttl_hours: 24

  # NSE Specific (if using NSE API)
  nse:
    base_url: "https://www.nseindia.com"
    use_proxy: false

  # Yahoo Finance
  yahoo:
    base_url: "https://query1.finance.yahoo.com"
    interval: "1d"

# Signal History - Prevent duplicate alerts
signal_history:
  enabled: true
  max_age_hours: 24 # Re-alert after 24 hours if still valid
  file_path: "data/signal_history.json"

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/scanner.log"

# Performance Settings
performance:
  max_stocks_to_scan: 900 # Limit stocks to scan
  batch_size: 50 # Process in batches
  timeout_seconds: 30 # API timeout

# LLM Configuration (AI-powered analysis with automatic failover)
# Set enabled: true to use AI for generating detailed analysis
llm:
  enabled: false # Set to true to enable AI analysis

  # Primary/fallback provider preference
  # Order of failover: ollama -> minimax -> gemini -> anthropic -> openai
  # (free providers are tried first)
  provider: "openai"

  # Model settings (optional - defaults shown)
  openai_model: "gpt-4o"
  anthropic_model: "claude-3-5-sonnet-20241022"
  gemini_model: "gemini-1.5-pro"
  minimax_model: "abab6.5s-chat"
  ollama_model: "llama2"

  # Ollama URL (if running locally)
  ollama_url: "http://localhost:11434"

  # API Keys - MUST be set via environment variables:
  # - OPENAI_API_KEY
  # - ANTHROPIC_API_KEY
  # - GEMINI_API_KEY
  # - MINIMAX_API_KEY (free tier available at https://platform.minimax.io)
  # Or add them to .env file

  # Rate limit recovery time (seconds)
  # How long to wait before retrying a rate-limited provider
  rate_limit_recovery_seconds: 300

# Reasoning Engine Configuration (Hybrid AI + Rule-Based)
reasoning:
  enabled: true

  # Hybrid scoring weights
  hybrid_weights:
    rule_based: 60 # % weight for rule-based score
    ai_reasoning: 40 # % weight for AI score

  # AI Reasoner settings
  ai_reasoner:
    enabled: true
    min_confidence_threshold: 50 # Minimum AI score to trust

  # Explanation settings
  explanation:
    include_in_telegram: true
    max_length: 500 # characters

# Signal Intelligence Engine (SIE) Configuration
signal_intelligence:
  enabled: true

  # Monitoring settings
  monitoring:
    check_interval_minutes: 15
    market_hours_only: true
    max_signal_age_days: 30

  # Learning settings
  learning:
    auto_adjust_weights: true
    min_signals_for_adjustment: 20 # Minimum outcomes before weight change
    max_monthly_adjustment: 5 # Maximum % adjustment per month
    dampening_factor: 0.5 # Reduce adjustment impact

  # Notification settings
  notifications:
    outcome_alerts: true
    daily_summary: true
    weekly_report: true
    daily_summary_time: "16:00" # 4:00 PM IST
    weekly_report_day: "saturday"
