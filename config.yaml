# Stealth Accumulation Scanner AI Agent Configuration
# ====================================================

# Scanner Settings
scanner:
  # Stock Universe Filters
  universe:
    exchange: "NSE"
    min_market_cap_cr: 500 # ₹500 Cr
    min_avg_volume: 200000 # 200,000 shares

  # Lookback Periods (in trading days)
  lookback:
    min_range_days: 30
    max_range_days: 90
    volume_analysis_days: 20
    delivery_analysis_days: 10
    rs_analysis_days: 20

  # Accumulation Detection Thresholds
  thresholds:
    max_range_percentage: 25 # (Highest - Lowest) < 25%
    min_support_touches: 3
    support_deviation: 3 # < 3%
    min_delivery_pct: 50 # > 50% preferred
    resistance_proximity: 5 # within 5%

# AI Scoring Model Weights
scoring:
  weights:
    price_structure: 20
    volume_behavior: 20
    delivery_data: 15
    support_strength: 15
    relative_strength: 10
    volatility_compression: 10
    ma_behavior: 10

  thresholds:
    strong_setup: 80
    moderate_setup: 60

# Trade Setup Generator
trade_setup:
  entry:
    breakout_threshold: 0.02 # 2% above resistance
    early_entry_discount: 0.03 # 3% below resistance (early accumulation)

  stop_loss:
    below_support: 0.02 # 2% below support
    max_loss: 3 # Maximum 3%

  targets:
    t1_range_height: 1.0 # Range height breakout
    t2_range_height: 1.5 # 1.5x range
    t3_previous_high: true # Previous swing high

  duration:
    short_term_weeks: [2, 4]
    medium_term_months: [1, 3]

  # Time estimation based on ATR
  time_estimation:
    enabled: true
    atr_period: 14

# Telegram Bot Configuration
telegram:
  enabled: true
  bot_token: "8783468830:AAEkAid5JtrC5tEtcdJ1JKMY3uk1rem_4OM" # Replace with your bot token
  chat_id: "647296254" # Replace with your chat ID
  alert_threshold: 60 # Only send alerts for scores >= 60
  min_signals_per_scan: 2 # Minimum signals to send (pad with lower scores if needed)

# Scheduler Configuration - Runs every 15 minutes during market hours
scheduler:
  timezone: "Asia/Kolkata"

  # Scan every 15 minutes
  interval_minutes: 15

  # Market hours (9:15 AM to 3:30 PM IST)
  market_open_hour: 9
  market_open_minute: 15
  market_close_hour: 15
  market_close_minute: 30

  run_days: [1, 2, 3, 4, 5] # Monday to Friday

# Data Source Configuration
data:
  source: "yahoo" # yahoo, nse, or custom
  cache_enabled: true
  cache_ttl_hours: 24

  # NSE Specific (if using NSE API)
  nse:
    base_url: "https://www.nseindia.com"
    use_proxy: false

  # Yahoo Finance
  yahoo:
    base_url: "https://query1.finance.yahoo.com"
    interval: "1d"

# Signal History - Prevent duplicate alerts
signal_history:
  enabled: true
  max_age_hours: 24 # Re-alert after 24 hours if still valid
  file_path: "data/signal_history.json"

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/scanner.log"

# Performance Settings
performance:
  max_stocks_to_scan: 500 # Limit stocks to scan
  batch_size: 50 # Process in batches
  timeout_seconds: 30 # API timeout
